version: "3.9"

services:
  # ── PostgreSQL (application data) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       besql
      POSTGRES_USER:     besql_app
      POSTGRES_PASSWORD: change_me_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U besql_app -d besql"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL sandbox DB (isolated user query execution) ────────────────
  postgres_sandbox:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       besql_sandbox
      POSTGRES_USER:     besql_sandbox
      POSTGRES_PASSWORD: sandbox_password
    ports:
      - "5433:5432"
    volumes:
      - sandbox_data:/var/lib/postgresql/data
      - ./docker/postgres/sandbox_init.sql:/docker-entrypoint-initdb.d/01_sandbox.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U besql_sandbox -d besql_sandbox"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (caching: leaderboards, problem lists) ─────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RabbitMQ (submission queue for high-concurrency) ─────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: besql
      RABBITMQ_DEFAULT_PASS: change_me_in_production
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python FastAPI ────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: >-
        postgresql://besql_app:change_me_in_production@postgres:5432/besql
      SANDBOX_DATABASE_URL: >-
        postgresql://besql_sandbox:sandbox_password@postgres_sandbox:5432/besql_sandbox
      JWT_SECRET:                        "${JWT_SECRET_KEY:-change_me_in_production}"
      JWT_ALGORITHM:                     "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES:   "60"
      CORS_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000"
      # Port 5500 = nginx frontend container; 3000 = local dev server (optional)
    depends_on:
      postgres:         { condition: service_healthy }
      postgres_sandbox: { condition: service_healthy }

  # ── Static frontend (served by nginx) ────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  sandbox_data:
